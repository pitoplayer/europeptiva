server {
    listen 80;
    server_name europeptiva.com www.europeptiva.com europeptiva.es www.europeptiva.es;
    return 301 https://europeptiva.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.europeptiva.com www.europeptiva.es europeptiva.es;

    ssl_certificate /etc/letsencrypt/live/europeptiva.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/europeptiva.com/privkey.pem;

    return 301 https://europeptiva.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name europeptiva.com;

    ssl_certificate /etc/letsencrypt/live/europeptiva.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/europeptiva.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location /static/ {
        alias /home/peptidos/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/peptidos/app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
