# Configuración inicial (HTTP) — Certbot añade HTTPS automáticamente
server {
    listen 80;
    server_name europeptiva.com www.europeptiva.com europeptiva.es www.europeptiva.es;

    client_max_body_size 10M;

    location /static/ {
        alias /home/peptidos/app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/peptidos/app/media/;
        # no-cache (no larga duracion): las fotos de producto se reemplazan
        # con el mismo nombre de archivo, y un cache largo deja navegadores
        # viendo versiones viejas hasta que expira. nginx sigue validando
        # con ETag/Last-Modified, asi que el coste real es minimo.
        expires -1;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
