<div id="cookie-banner" class="fixed bottom-0 w-full bg-gray-900 text-white px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 z-50" style="display:none!important">
    <p class="text-sm">Usamos cookies técnicas necesarias para el funcionamiento de la tienda (sesión y carrito).
        <a href="{% url 'cookies' %}" class="underline text-accent ml-1">Más información</a>
    </p>
    <button onclick="acceptCookies()" class="bg-accent text-white px-6 py-2 rounded-lg text-sm font-semibold hover:bg-green-500 whitespace-nowrap">
        Aceptar
    </button>
</div>
<script>
    (function() {
        if (!localStorage.getItem('cookies_accepted')) {
            document.getElementById('cookie-banner').style.removeProperty('display');
        }
    })();
    function acceptCookies() {
        localStorage.setItem('cookies_accepted', 'true');
        document.getElementById('cookie-banner').style.display = 'none';
    }
</script>
